<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>形近字辨析练习 - 喵字帖</title>
    <link rel="stylesheet" href="common.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%) !important;
        }

        .control-panel {
            padding: 25px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .hint {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 18px;
            font-size: 14px;
            color: #7a5c00;
            line-height: 1.6;
        }

        .options-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 14px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #444;
        }

        .option-item select {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        select:focus {
            outline: none;
            border-color: #a18cd1;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a18cd1 0%, #8b6fc9 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
        }

        /* ===== 测验区 ===== */
        .quiz-stage {
            padding: 30px;
            text-align: center;
        }

        .stage-empty {
            color: #999;
            padding: 30px 0;
        }

        .stage-empty::before {
            content: "🔍";
            display: block;
            font-size: 3.5em;
            margin-bottom: 10px;
        }

        .quiz-progress {
            font-size: 1.05em;
            font-weight: bold;
            color: #333;
            margin-bottom: 16px;
        }

        .sentence-box {
            background: #f5f0ff;
            border: 1px solid #e4d9f7;
            border-radius: 12px;
            padding: 20px;
            font-size: 22px;
            color: #333;
            line-height: 1.8;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .sentence-box .blank {
            display: inline-block;
            min-width: 40px;
            border-bottom: 3px solid #a18cd1;
            color: #a18cd1;
            font-weight: bold;
        }

        .choice-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 420px;
            margin: 0 auto 16px;
        }

        .choice-btn {
            padding: 16px 4px;
            border-radius: 12px;
            border: 2px solid #ddd;
            background: white;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
        }

        .choice-btn:hover:not(:disabled) {
            border-color: #a18cd1;
            transform: translateY(-2px);
        }

        .choice-btn:disabled {
            cursor: default;
        }

        .choice-btn.correct {
            background: #e8f8ee;
            border-color: #43a047;
            color: #2e7d32;
        }

        .choice-btn.wrong {
            background: #ffebee;
            border-color: #e53935;
            color: #c62828;
        }

        .quiz-feedback {
            font-size: 1.02em;
            min-height: 26px;
            margin-bottom: 6px;
        }

        .quiz-feedback.correct {
            color: #2e7d32;
            font-weight: bold;
        }

        .quiz-feedback.mistake {
            color: #e53935;
            font-weight: bold;
        }

        .tip-box {
            font-size: 13px;
            color: #7a5c00;
            background: #fff8e1;
            border-radius: 8px;
            padding: 10px 14px;
            margin: 0 auto 14px;
            max-width: 480px;
            display: none;
        }

        .tip-box.active {
            display: block;
        }

        /* ===== 结果区 ===== */
        .result-panel {
            display: none;
            padding: 0 30px 30px;
            text-align: center;
        }

        .result-panel.active {
            display: block;
        }

        .result-summary {
            background: #f5f0ff;
            border: 1px solid #e4d9f7;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 16px;
            color: #6a4c9c;
            margin-bottom: 16px;
        }

        .missed-list {
            text-align: left;
            font-size: 13px;
            color: #555;
            background: #fff8e1;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .missed-list li {
            margin-bottom: 6px;
            list-style: none;
        }

        @media (max-width: 600px) {
            .control-panel {
                padding: 18px;
            }

            .sentence-box {
                font-size: 18px;
            }

            .choice-btn {
                font-size: 20px;
                padding: 12px 4px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-link">← 返回首页</a>
            <h1>🔍 形近字辨析练习</h1>
            <p>看句子选对字，分清那些长得很像的汉字</p>
        </div>

        <div class="control-panel">
            <div class="hint">
                <strong>💡 使用说明：</strong>句子中留了一个空，四个字里只有一个能让句子正确、通顺，选对后会给出这组形近字的记忆小贴士。
            </div>

            <div class="options-group">
                <div class="option-item">
                    <label>题目数量：</label>
                    <select id="quizCount">
                        <option value="10">10 题</option>
                        <option value="15" selected>15 题</option>
                        <option value="30">30 题</option>
                        <option value="66">全部 66 题</option>
                    </select>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="startQuiz()">▶️ 开始练习</button>
            </div>
        </div>

        <div class="quiz-stage" id="quizStage">
            <div class="stage-empty" id="stageEmpty">
                设置好题量后，点击"开始练习"
            </div>
            <div id="quizActive" style="display: none;">
                <div class="quiz-progress" id="quizProgress">第 1 / 10 题</div>
                <div class="sentence-box" id="sentenceBox"></div>
                <div class="choice-grid" id="choiceGrid"></div>
                <div class="quiz-feedback" id="quizFeedback"></div>
                <div class="tip-box" id="tipBox"></div>
                <div class="button-group" style="justify-content: center;">
                    <button class="btn btn-primary" id="nextBtn" style="display: none;" onclick="nextQuestion()">⏭
                        下一题</button>
                </div>
            </div>
        </div>

        <div class="result-panel" id="resultPanel">
            <h3 style="margin-bottom: 12px; color: #333;">🎉 练习完成！</h3>
            <div class="result-summary" id="resultSummary"></div>
            <ul class="missed-list" id="missedList" style="display: none;"></ul>
            <div class="button-group" style="justify-content: center;">
                <button class="btn btn-primary" onclick="startQuiz()">🔄 再来一组</button>
            </div>
        </div>

        <footer class="footer">
            <p>
                <a href="https://github.com/caicaicai/miaozitie" target="_blank" rel="noopener noreferrer">GitHub
                    开源</a>
                &nbsp;|&nbsp; MIT License · 专为小学生设计的形近字辨析练习工具
            </p>
        </footer>
    </div>

    <script>
        // sentence 中用 ___ 代表空格；options 里第一个不一定是正确答案，answer 才是正确答案
        const questionBank = [
            { sentence: '他___经写完作业了。', options: ['已', '己', '巳', '包'], answer: '已', tip: '已：已经、表示动作已发生；己：自己；巳：十二时辰之一，读 sì。口诀：开口己，半开已，全封巳。' },
            { sentence: '这是我自___的想法，你要尊重。', options: ['己', '已', '巳', '记'], answer: '己', tip: '己：自己；已：已经；巳：读 sì，十二时辰之一。' },
            { sentence: '现在还___到放学时间。', options: ['未', '末', '术', '木'], answer: '未', tip: '未：还没有，如"未到"；末：末尾、最后；木：树木；术：技术。' },
            { sentence: '学期___的时候，学校会安排考试。', options: ['末', '未', '术', '木'], answer: '末', tip: '末：末尾、最后，如"学期末"；未：还没有；木：树木；术：技术。' },
            { sentence: '我口___了，想喝水。', options: ['渴', '喝', '竭', '歇'], answer: '渴', tip: '渴：氵（水）+曷，表示身体缺水；喝：口+曷，表示用口喝东西；竭：用尽；歇：休息。' },
            { sentence: '他一口气___完了一杯水。', options: ['喝', '渴', '竭', '歇'], answer: '喝', tip: '喝：口+曷，用口喝东西；渴：身体缺水；竭：用尽；歇：休息。' },
            { sentence: '妈妈帮我扎了一个___子。', options: ['辫', '辨', '辩', '瓣'], answer: '辫', tip: '辫：纟（丝线）+辡，编成的头发；辨：分辨、辨别；辩：讠（言）+辡，辩论；瓣：瓜果的组成部分。' },
            { sentence: '我们要学会___别是非。', options: ['辨', '辩', '辫', '瓣'], answer: '辨', tip: '辨：分辨、辨别；辩：讠（言）+辡，辩论；辫：头发编成的辫子；瓣：瓜果的组成部分。' },
            { sentence: '今天天气很___朗。', options: ['晴', '睛', '清', '请'], answer: '晴', tip: '晴：日+青，天气晴朗；睛：目+青，眼睛；清：氵+青，水清澈；请：讠+青，请求。' },
            { sentence: '小猫的眼___又大又圆。', options: ['睛', '晴', '清', '请'], answer: '睛', tip: '睛：目+青，眼睛；晴：天气晴朗；清：水清澈；请：请求。' },
            { sentence: '妈妈去市场买___。', options: ['菜', '采', '彩', '踩'], answer: '菜', tip: '菜：艹（草）+采，蔬菜；采：采摘；彩：彑+彡，色彩；踩：足+采，用脚踩。' },
            { sentence: '蜜蜂在花丛中___蜜。', options: ['采', '菜', '彩', '踩'], answer: '采', tip: '采：采摘的动作，如"采蜜"；菜：蔬菜；彩：色彩；踩：用脚踩。' },
            { sentence: '他长得很___爸爸。', options: ['像', '象', '相', '向'], answer: '像', tip: '像：亻+象，好像、相似；象：大象，也指样子；相：互相、照相；向：方向。' },
            { sentence: '大___的耳朵很大。', options: ['象', '像', '相', '向'], answer: '象', tip: '象：大象，也指样子；像：好像、相似；相：互相；向：方向。' },
            { sentence: '请认真___作业。', options: ['做', '作', '坐', '座'], answer: '做', tip: '做、作、坐、座都读 zuò。做：具体动作，如"做作业""做饭"；作：多用于合成词，如"作文""作业"；坐：坐下的动作；座：座位。' },
            { sentence: '我们的___文课很有趣。', options: ['作', '做', '坐', '座'], answer: '作', tip: '作：多用于合成词，如"作文"；做：具体动作；坐：坐下；座：座位。' },
            { sentence: '今天的天空是___色的。', options: ['蓝', '篮', '兰', '滥'], answer: '蓝', tip: '蓝：艹+监，颜色；篮：竹+监，篮子；兰：兰花；滥：氵+监，过多、不加选择。' },
            { sentence: '他把球投进了___框。', options: ['篮', '蓝', '兰', '滥'], answer: '篮', tip: '篮：竹+监，篮子、篮框；蓝：颜色；兰：兰花；滥：过多。' },
            { sentence: '___是我的铅笔盒。', options: ['那', '哪', '娜', '部'], answer: '那', tip: '那：指示代词，指那个；哪：疑问代词，问哪个；娜：常用于人名；部：部分、部门。' },
            { sentence: '你的家在___里？', options: ['哪', '那', '娜', '部'], answer: '哪', tip: '哪：疑问代词，问哪个；那：指示代词，指那个；娜：常用于人名；部：部分、部门。' },
            { sentence: '我们明天___学校见。', options: ['在', '再', '存', '左'], answer: '在', tip: '在：表示地点、存在，如"在学校"；再：表示重复、继续；存：保存；左：方向。' },
            { sentence: '请你___说一遍这个词语。', options: ['再', '在', '存', '左'], answer: '再', tip: '再：表示重复、继续，如"再说一遍"；在：表示地点、存在；存：保存；左：方向。' },
            { sentence: '他高兴___笑了起来。', options: ['地', '的', '得', '底'], answer: '地', tip: '地：用在动词前作状语，如"高兴地笑"；的：用在名词前，如"我的书"；得：用在动词后，如"跑得快"；底：底部。' },
            { sentence: '这是我___新书包。', options: ['的', '地', '得', '底'], answer: '的', tip: '的：用在名词前，表示所属，如"我的书包"；地：用在动词前；得：用在动词后；底：底部。' },
            { sentence: '他跑___非常快。', options: ['得', '的', '地', '德'], answer: '得', tip: '得：用在动词后表示程度，如"跑得快"；的：用在名词前；地：用在动词前；德：品德。' },
            { sentence: '请排队___教室，不要拥挤。', options: ['入', '人', '八', '九'], answer: '入', tip: '入：进入、由外到内；人：人类、人物；八：数字8；九：数字9。' },
            { sentence: '他是一个热心的好___。', options: ['人', '入', '八', '几'], answer: '人', tip: '人：人类、人物；入：进入；八：数字8；几：几个、桌子。' },
            { sentence: '衣服已经晒___了，可以收了。', options: ['干', '千', '于', '午'], answer: '干', tip: '干：干燥、做事；千：数字1000；于：介词，如"关于"；午：中午、正午。' },
            { sentence: '这本书大约有一___字。', options: ['千', '干', '于', '午'], answer: '千', tip: '千：数字1000；干：干燥；于：介词；午：中午。' },
            { sentence: '花儿种在肥沃的___里。', options: ['土', '士', '干', '王'], answer: '土', tip: '土：泥土、土地；士：士兵、人士；干：干燥；王：君王、国王。' },
            { sentence: '他长大后成为一名解放军战___。', options: ['士', '土', '干', '王'], answer: '士', tip: '士：士兵、人士；土：泥土；干：干燥；王：君王。' },
            { sentence: '这件事___我来负责解决。', options: ['由', '甲', '申', '电'], answer: '由', tip: '由：由于、原因，表示凭借；甲：第一、盔甲；申：申请、说明；电：电力、电器。' },
            { sentence: '他这次考试得了___等奖。', options: ['甲', '由', '申', '电'], answer: '甲', tip: '甲：第一，如"甲等"；由：由于；申：申请；电：电力。' },
            { sentence: '森林里住着一只可爱的小___子。', options: ['兔', '免', '色', '鬼'], answer: '兔', tip: '兔：兔子，动物名；免：免除、避免；色：颜色；鬼：鬼怪。' },
            { sentence: '今天动物园门票全部___费。', options: ['免', '兔', '色', '鬼'], answer: '免', tip: '免：免除、避免，如"免费"；兔：兔子；色：颜色；鬼：鬼怪。' },
            { sentence: '树枝上停着一只唱歌的小___。', options: ['鸟', '乌', '鸦', '鸣'], answer: '鸟', tip: '鸟：小鸟，字里有一点像眼睛；乌：乌黑、乌鸦，没有那一点；鸦：乌鸦；鸣：鸣叫。' },
            { sentence: '他的头发___黑浓密。', options: ['乌', '鸟', '鸦', '鸣'], answer: '乌', tip: '乌：乌黑，没有点；鸟：小鸟，有一点；鸦：乌鸦；鸣：鸣叫。' },
            { sentence: '海边的沙滩上有很多金黄色的___子。', options: ['沙', '纱', '炒', '吵'], answer: '沙', tip: '沙：氵+少，沙子、沙滩；纱：纟+少，纱布；炒：火+少，炒菜；吵：口+少，吵闹。' },
            { sentence: '妈妈买了一条漂亮的___巾。', options: ['纱', '沙', '吵', '炒'], answer: '纱', tip: '纱：纟（丝线）+少，薄布料；沙：沙子；吵：吵闹；炒：炒菜。' },
            { sentence: '隔壁在装修，很___，我睡不着。', options: ['吵', '炒', '沙', '纱'], answer: '吵', tip: '吵：口+少，吵闹、声音大；炒：火+少，炒菜；沙：沙子；纱：薄布料。' },
            { sentence: '妈妈正在厨房里___菜。', options: ['炒', '吵', '沙', '纱'], answer: '炒', tip: '炒：火+少，用火翻炒；吵：吵闹；沙：沙子；纱：薄布料。' },
            { sentence: '老师把我们分成四个小___。', options: ['组', '租', '阻', '祖'], answer: '组', tip: '组：纟+且，小组、组成；租：禾+且，租金；阻：阝+且，阻止；祖：礻+且，祖先。' },
            { sentence: '他每个月都要付房___。', options: ['租', '组', '阻', '祖'], answer: '租', tip: '租：禾+且，租金、出租；组：小组；阻：阻止；祖：祖先。' },
            { sentence: '我们的___国有着悠久的历史。', options: ['祖', '租', '组', '阻'], answer: '祖', tip: '祖：礻+且，祖先、祖国；租：租金；组：小组；阻：阻止。' },
            { sentence: '他不小心把杯子里的水___了一地。', options: ['洒', '酒', '洗', '汗'], answer: '洒', tip: '洒：氵+西，洒落；酒：氵+酉，酒水；洗：氵+先，洗涤；汗：氵+干，汗水。' },
            { sentence: '爸爸从不在家里喝___。', options: ['酒', '洒', '汗', '洗'], answer: '酒', tip: '酒：氵+酉，酒水；洒：洒落；汗：汗水；洗：洗涤。' },
            { sentence: '北方的秋天天气十分干___。', options: ['燥', '躁', '操', '澡'], answer: '燥', tip: '燥：火+喿，干燥，与火（热）有关；躁：足+喿，急躁；操：手+喿，操作；澡：氵+喿，洗澡，与水有关。' },
            { sentence: '他一遇到困难就变得很急___。', options: ['躁', '燥', '操', '澡'], answer: '躁', tip: '躁：足+喿，急躁，脚不停跳动；燥：干燥；操：操作；澡：洗澡。' },
            { sentence: '每天睡觉前要记得洗___。', options: ['澡', '操', '燥', '躁'], answer: '澡', tip: '澡：氵+喿，洗澡，与水有关；操：操作、体操；燥：干燥；躁：急躁。' },
            { sentence: '同学们排好队做课间___。', options: ['操', '澡', '燥', '躁'], answer: '操', tip: '操：手+喿，操作、体操；澡：洗澡；燥：干燥；躁：急躁。' },
            { sentence: '奶奶今天去医院___了一颗坏牙。', options: ['拔', '拨', '拢', '拉'], answer: '拔', tip: '拔：扌+犮，拔出，如"拔牙"；拨：扌+发，拨动、拨打；拢：扌+龙，靠拢；拉：扌+立，拉动。' },
            { sentence: '请你___打这个电话号码试试。', options: ['拨', '拔', '拢', '拉'], answer: '拨', tip: '拨：扌+发，拨动、拨打；拔：拔出；拢：靠拢；拉：拉动。' },
            { sentence: '今年学校的学生人数又___加了。', options: ['增', '曾', '层', '僧'], answer: '增', tip: '增：土+曾，增加，与数量有关；曾：曾经，表示过去；层：层次、楼层；僧：僧人。' },
            { sentence: '我___经在这条街上住过三年。', options: ['曾', '增', '层', '僧'], answer: '曾', tip: '曾：曾经，表示过去发生过；增：增加；层：层次；僧：僧人。' },
            { sentence: '大家都非常羡___那位伟大的科学家。', options: ['慕', '幕', '墓', '暮'], answer: '慕', tip: '慕：心+莫，羡慕，用心去仰慕；幕：巾+莫，幕布，是布做的；墓：土+莫，坟墓，埋在土里；暮：日+莫，日暮，太阳落下。' },
            { sentence: '天色渐渐变暗，___色笼罩了整片田野。', options: ['暮', '幕', '墓', '慕'], answer: '暮', tip: '暮：日+莫，日暮、黄昏；幕：幕布；墓：坟墓；慕：羡慕。' },
            { sentence: '演出开始前，___布缓缓拉开。', options: ['幕', '暮', '墓', '慕'], answer: '幕', tip: '幕：巾+莫，幕布，是布做的；暮：黄昏；墓：坟墓；慕：羡慕。' },
            { sentence: '春天到了，一只小___子从南方飞了回来。', options: ['燕', '宴', '咽', '烟'], answer: '燕', tip: '燕：燕子，一种鸟；宴：宀+妟，宴会，在屋子里举行；咽：咽喉；烟：烟雾。' },
            { sentence: '姐姐结婚那天，家里办了一场热闹的婚___。', options: ['宴', '燕', '咽', '烟'], answer: '宴', tip: '宴：宀+妟，宴会；燕：燕子；咽：咽喉；烟：烟雾。' },
            { sentence: '他不小心把杯子摔___了。', options: ['破', '坡', '皮', '波'], answer: '破', tip: '破：石+皮，破碎、损坏；坡：土+皮，山坡，与土地有关；皮：皮肤；波：氵+皮，波浪，与水有关。' },
            { sentence: '山___上开满了五颜六色的野花。', options: ['坡', '破', '皮', '波'], answer: '坡', tip: '坡：土+皮，山坡，与土地有关；破：破碎；皮：皮肤；波：波浪。' },
            { sentence: '他对朋友一直很有感___。', options: ['情', '晴', '请', '清'], answer: '情', tip: '情：忄+青，感情、心情；晴：日+青，天气晴朗；请：讠+青，请求；清：氵+青，水清澈。' },
            { sentence: '不要___了带雨伞，今天会下雨。', options: ['忘', '望', '忙', '忍'], answer: '忘', tip: '忘：心+亡，忘记，心里失去了；望：望向远方；忙：忙碌；忍：忍耐。' },
            { sentence: '他站在山顶远___四周的风景。', options: ['望', '忘', '忙', '忍'], answer: '望', tip: '望：王+月，望向远方；忘：忘记；忙：忙碌；忍：忍耐。' },
            { sentence: '他戴着一___漂亮的帽子。', options: ['顶', '项', '顺', '须'], answer: '顶', tip: '顶：页+丁，顶部，也作帽子的量词；项：项目、事项；顺：顺利；须：必须。' },
            { sentence: '跳远是运动会的一个比赛___目。', options: ['项', '顶', '顺', '须'], answer: '项', tip: '项：页+工，项目、事项；顶：顶部；顺：顺利；须：必须。' }
        ];

        let quizQuestions = [];
        let quizIndex = 0;
        let quizCorrect = 0;
        let missedItems = [];

        function shuffle(arr) {
            return [...arr].sort(() => Math.random() - 0.5);
        }

        function setFeedback(text, kind) {
            const el = document.getElementById('quizFeedback');
            el.textContent = text;
            el.className = 'quiz-feedback' + (kind ? ' ' + kind : '');
        }

        function startQuiz() {
            const count = parseInt(document.getElementById('quizCount').value) || 10;
            quizQuestions = shuffle(questionBank).slice(0, Math.min(count, questionBank.length));
            quizIndex = 0;
            quizCorrect = 0;
            missedItems = [];

            document.getElementById('stageEmpty').style.display = 'none';
            document.getElementById('quizActive').style.display = 'block';
            document.getElementById('resultPanel').classList.remove('active');

            nextQuestion();
        }

        function nextQuestion() {
            if (quizIndex >= quizQuestions.length) {
                finishQuiz();
                return;
            }

            const q = quizQuestions[quizIndex];
            quizIndex++;

            document.getElementById('quizProgress').textContent = `第 ${quizIndex} / ${quizQuestions.length} 题`;
            document.getElementById('sentenceBox').innerHTML =
                q.sentence.replace('___', '<span class="blank">　</span>');

            const grid = document.getElementById('choiceGrid');
            grid.innerHTML = '';
            shuffle(q.options).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = opt;
                btn.onclick = () => selectChoice(btn, opt, q);
                grid.appendChild(btn);
            });

            setFeedback('');
            document.getElementById('tipBox').classList.remove('active');
            document.getElementById('nextBtn').style.display = 'none';
        }

        function selectChoice(btn, opt, q) {
            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(b => { b.disabled = true; });

            if (opt === q.answer) {
                quizCorrect++;
                btn.classList.add('correct');
                setFeedback('✅ 选对了！', 'correct');
                document.getElementById('sentenceBox').innerHTML =
                    q.sentence.replace('___', `<span class="blank">${q.answer}</span>`);
            } else {
                btn.classList.add('wrong');
                setFeedback(`❌ 不对哦，正确答案是"${q.answer}"`, 'mistake');
                document.getElementById('sentenceBox').innerHTML =
                    q.sentence.replace('___', `<span class="blank">${q.answer}</span>`);
                buttons.forEach(b => {
                    if (b.textContent === q.answer) b.classList.add('correct');
                });
                missedItems.push(q);
            }

            const tipBox = document.getElementById('tipBox');
            tipBox.textContent = '💡 ' + q.tip;
            tipBox.classList.add('active');

            document.getElementById('nextBtn').style.display = 'inline-block';
        }

        function finishQuiz() {
            document.getElementById('quizActive').style.display = 'none';
            document.getElementById('resultPanel').classList.add('active');

            const total = quizQuestions.length;
            const rate = total ? Math.round((quizCorrect / total) * 100) : 0;
            document.getElementById('resultSummary').textContent =
                `共 ${total} 题，答对 ${quizCorrect} 题，正确率 ${rate}%`;

            const missedList = document.getElementById('missedList');
            if (missedItems.length) {
                missedList.style.display = 'block';
                missedList.innerHTML = '<li style="font-weight:bold; margin-bottom:8px;">📝 这些题目答错了，再看看：</li>' +
                    missedItems.map(q => `<li>${q.sentence.replace('___', q.answer)}　（${q.tip}）</li>`).join('');
            } else {
                missedList.style.display = 'none';
            }
        }
    </script>
</body>
