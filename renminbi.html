<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人民币凑钱练习 - 喵字帖</title>
    <link rel="stylesheet" href="common.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%) !important;
        }

        .control-panel {
            padding: 25px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .hint {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 18px;
            font-size: 14px;
            color: #7a5c00;
            line-height: 1.6;
        }

        .options-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 14px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #444;
        }

        .option-item select {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        select:focus {
            outline: none;
            border-color: #f6a94a;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f6a94a 0%, #fd7e14 100%);
            color: white;
        }

        .btn-secondary {
            background: #e9ecef;
            color: #444;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
        }

        /* ===== 测验区 ===== */
        .quiz-stage {
            padding: 30px;
        }

        .stage-empty {
            color: #999;
            padding: 30px 0;
            text-align: center;
        }

        .stage-empty::before {
            content: "💰";
            display: block;
            font-size: 3.5em;
            margin-bottom: 10px;
        }

        .quiz-progress {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-bottom: 6px;
        }

        .target-amount {
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            color: #d2691e;
            margin-bottom: 18px;
        }

        .money-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .money-chip {
            border: none;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 14px;
            transition: transform 0.15s;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
        }

        .money-chip:hover {
            transform: translateY(-2px) scale(1.05);
        }

        .money-chip.bill {
            width: 84px;
            height: 46px;
            border-radius: 8px;
        }

        .money-chip.coin {
            width: 52px;
            height: 52px;
            border-radius: 50%;
        }

        .tray-wrap {
            background: #fdf6ec;
            border: 2px dashed #f0c987;
            border-radius: 12px;
            padding: 14px;
            min-height: 70px;
            margin-bottom: 14px;
        }

        .tray-label {
            font-size: 12px;
            color: #a67c00;
            margin-bottom: 8px;
        }

        .tray-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 30px;
        }

        .tray-chip {
            padding: 4px 10px;
            border-radius: 14px;
            background: white;
            border: 1px solid #ddd;
            font-size: 12px;
            color: #555;
        }

        .tray-total {
            text-align: right;
            font-size: 15px;
            font-weight: bold;
            color: #333;
            margin-top: 8px;
        }

        .quiz-feedback {
            text-align: center;
            font-size: 1.05em;
            min-height: 28px;
            margin-bottom: 10px;
        }

        .quiz-feedback.correct {
            color: #2e7d32;
            font-weight: bold;
        }

        .quiz-feedback.mistake {
            color: #e53935;
            font-weight: bold;
        }

        /* ===== 结果区 ===== */
        .result-panel {
            display: none;
            padding: 0 30px 30px;
            text-align: center;
        }

        .result-panel.active {
            display: block;
        }

        .result-summary {
            background: #fff3ec;
            border: 1px solid #ffd6bd;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 16px;
            color: #b35300;
            margin-bottom: 16px;
        }

        @media (max-width: 600px) {
            .control-panel {
                padding: 18px;
            }

            .money-chip.bill {
                width: 70px;
                height: 40px;
                font-size: 12px;
            }

            .money-chip.coin {
                width: 44px;
                height: 44px;
                font-size: 11px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-link">← 返回首页</a>
            <h1>💰 人民币凑钱练习</h1>
            <p>点击面额凑出目标金额，认识人民币、练习加法</p>
        </div>

        <div class="control-panel">
            <div class="hint">
                <strong>💡 使用说明：</strong>系统会随机给出一个目标金额，点击下方的钱币面额把它们加起来，凑够目标金额后会自动判对并进入下一题，无需再点确认。
            </div>

            <div class="options-group">
                <div class="option-item">
                    <label>难度：</label>
                    <select id="difficultySelect">
                        <option value="yuan" selected>只用整元（简单）</option>
                        <option value="jiao">元 + 角（较难）</option>
                    </select>
                </div>
                <div class="option-item">
                    <label>题目数量：</label>
                    <select id="roundSelect">
                        <option value="5">5 题</option>
                        <option value="10" selected>10 题</option>
                        <option value="15">15 题</option>
                    </select>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="startMoneyQuiz()">▶️ 开始练习</button>
            </div>
        </div>

        <div class="quiz-stage" id="quizStage">
            <div class="stage-empty" id="stageEmpty">
                设置好难度和题量后，点击"开始练习"
            </div>
            <div id="quizActive" style="display: none;">
                <div class="quiz-progress" id="quizProgress">第 1 / 10 题</div>
                <div class="target-amount" id="targetAmount">目标：¥0</div>

                <div class="money-buttons" id="moneyButtons"></div>

                <div class="tray-wrap">
                    <div class="tray-label">🧺 已选钱币：</div>
                    <div class="tray-chips" id="trayChips"></div>
                    <div class="tray-total" id="trayTotal">合计：¥0</div>
                </div>

                <div class="quiz-feedback" id="quizFeedback"></div>

                <div class="button-group" style="justify-content: center;">
                    <button class="btn btn-secondary" id="undoBtn" onclick="undoChip()">↩️ 撤销一个</button>
                    <button class="btn btn-secondary" id="clearBtn" onclick="clearChips()">🗑️ 清空</button>
                    <button class="btn btn-secondary" id="nextRoundBtn" style="display: none;"
                        onclick="nextMoneyRound()">⏭ 下一题</button>
                </div>
            </div>
        </div>

        <div class="result-panel" id="resultPanel">
            <h3 style="margin-bottom: 12px; color: #333;">🎉 练习完成！</h3>
            <div class="result-summary" id="resultSummary"></div>
            <div class="button-group" style="justify-content: center;">
                <button class="btn btn-primary" onclick="startMoneyQuiz()">🔄 再来一组</button>
            </div>
        </div>

        <footer class="footer">
            <p>
                <a href="https://github.com/caicaicai/miaozitie" target="_blank" rel="noopener noreferrer">GitHub
                    开源</a>
                &nbsp;|&nbsp; MIT License · 专为小学生设计的人民币认知练习工具
            </p>
        </footer>
    </div>

    <script>
        // 面额统一用"角"作为最小单位存储，避免小数精度问题
        const denominations = [
            { v: 1000, label: '100元', color: '#c0392b', coin: false },
            { v: 500, label: '50元', color: '#8e44ad', coin: false },
            { v: 200, label: '20元', color: '#2980b9', coin: false },
            { v: 100, label: '10元', color: '#16a085', coin: false },
            { v: 50, label: '5元', color: '#d35400', coin: false },
            { v: 10, label: '1元', color: '#27ae60', coin: false },
            { v: 5, label: '5角', color: '#7f8c8d', coin: true },
            { v: 1, label: '1角', color: '#95a5a6', coin: true }
        ];

        let roundTotal = 10;
        let roundIndex = 0;
        let correctCount = 0;
        let target = 0;
        let selectedChips = [];
        let roundLocked = false;
        let autoAdvanceTimer = null;

        function formatMoney(jiao) {
            const yuan = Math.floor(jiao / 10);
            const rem = jiao % 10;
            return rem === 0 ? `¥${yuan}` : `¥${yuan}.${rem}`;
        }

        function renderMoneyButtons(includeJiao) {
            const wrap = document.getElementById('moneyButtons');
            wrap.innerHTML = '';
            const pool = includeJiao ? denominations : denominations.filter(d => !d.coin);

            pool.forEach(d => {
                const btn = document.createElement('button');
                btn.className = 'money-chip ' + (d.coin ? 'coin' : 'bill');
                btn.style.background = d.color;
                btn.textContent = d.label;
                btn.onclick = () => addChip(d);
                wrap.appendChild(btn);
            });
        }

        function addChip(d) {
            if (roundLocked) return;
            selectedChips.push(d);
            renderTray();
        }

        function undoChip() {
            if (roundLocked) return;
            selectedChips.pop();
            renderTray();
        }

        function clearChips() {
            if (roundLocked) return;
            selectedChips = [];
            renderTray();
        }

        function renderTray() {
            const chipsWrap = document.getElementById('trayChips');
            chipsWrap.innerHTML = selectedChips.map(d => `<span class="tray-chip">${d.label}</span>`).join('');
            const sum = selectedChips.reduce((acc, d) => acc + d.v, 0);
            document.getElementById('trayTotal').textContent = `合计：${formatMoney(sum)}`;
            if (!roundLocked) updateLiveFeedback(sum);
            return sum;
        }

        function setMoneyControlsDisabled(disabled) {
            document.querySelectorAll('.money-chip').forEach(btn => { btn.disabled = disabled; });
            document.getElementById('undoBtn').disabled = disabled;
            document.getElementById('clearBtn').disabled = disabled;
        }

        function updateLiveFeedback(sum) {
            if (sum === target) {
                roundLocked = true;
                correctCount++;
                setFeedback('✅ 凑对了，真棒！', 'correct');
                setMoneyControlsDisabled(true);
                document.getElementById('nextRoundBtn').style.display = 'inline-block';
                autoAdvanceTimer = setTimeout(nextMoneyRound, 1200);
            } else if (sum === 0) {
                setFeedback('');
            } else if (sum > target) {
                setFeedback(`还多了 ${formatMoney(sum - target)}，试着去掉一些`, 'mistake');
            } else {
                setFeedback(`还差 ${formatMoney(target - sum)}，请继续添加`, '');
            }
        }

        function randomTarget(includeJiao) {
            const pool = includeJiao ? denominations : denominations.filter(d => !d.coin);
            let sum = 0;
            const picks = 2 + Math.floor(Math.random() * 3);
            for (let i = 0; i < picks; i++) {
                const d = pool[Math.floor(Math.random() * pool.length)];
                const count = 1 + Math.floor(Math.random() * 2);
                sum += d.v * count;
            }
            return sum === 0 ? pool[0].v : sum;
        }

        function setFeedback(text, kind) {
            const el = document.getElementById('quizFeedback');
            el.textContent = text;
            el.className = 'quiz-feedback' + (kind ? ' ' + kind : '');
        }

        function startMoneyQuiz() {
            roundTotal = parseInt(document.getElementById('roundSelect').value) || 10;
            roundIndex = 0;
            correctCount = 0;
            document.getElementById('stageEmpty').style.display = 'none';
            document.getElementById('quizActive').style.display = 'block';
            document.getElementById('resultPanel').classList.remove('active');
            nextMoneyRound();
        }

        function nextMoneyRound() {
            if (autoAdvanceTimer) {
                clearTimeout(autoAdvanceTimer);
                autoAdvanceTimer = null;
            }

            if (roundIndex >= roundTotal) {
                finishMoneyQuiz();
                return;
            }
            roundIndex++;

            const includeJiao = document.getElementById('difficultySelect').value === 'jiao';
            target = randomTarget(includeJiao);
            selectedChips = [];
            roundLocked = false;

            document.getElementById('quizProgress').textContent = `第 ${roundIndex} / ${roundTotal} 题`;
            document.getElementById('targetAmount').textContent = `目标：${formatMoney(target)}`;
            renderMoneyButtons(includeJiao);
            setMoneyControlsDisabled(false);
            renderTray();
            setFeedback('');
            document.getElementById('nextRoundBtn').style.display = 'none';
        }

        function finishMoneyQuiz() {
            document.getElementById('quizActive').style.display = 'none';
            document.getElementById('resultPanel').classList.add('active');
            const rate = roundTotal ? Math.round((correctCount / roundTotal) * 100) : 0;
            document.getElementById('resultSummary').textContent =
                `共 ${roundTotal} 题，凑对 ${correctCount} 题，正确率 ${rate}%`;
        }
    </script>
</body>

</html>
